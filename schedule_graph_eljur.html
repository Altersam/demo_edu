* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; overflow: hidden; }
.header {
    background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
    padding: 12px 24px; border-bottom: 1px solid #475569;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap; height: 56px;
}
.header h1 { font-size: 16px; font-weight: 600; color: #f8fafc; white-space: nowrap; }
.header h1 span { color: #60a5fa; }
.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.controls select {
    background: #1e293b; color: #e2e8f0; border: 1px solid #475569;
    padding: 6px 10px; border-radius: 6px; font-size: 13px; min-width: 160px;
}
.controls button {
    background: #3b82f6; color: white; border: none; padding: 6px 14px;
    border-radius: 6px; cursor: pointer; font-size: 13px; transition: background 0.2s;
}
.controls button:hover { background: #2563eb; }
.controls button.reset { background: #64748b; }
.controls button.reset:hover { background: #475569; }
.main { display: flex; height: calc(100vh - 56px); }
.sidebar {
    width: 280px; background: #1e293b; border-right: 1px solid #334155;
    overflow-y: auto; padding: 12px; flex-shrink: 0;
}
.sidebar h3 {
    font-size: 11px; color: #94a3b8; text-transform: uppercase;
    letter-spacing: 0.8px; margin: 12px 0 6px; padding-bottom: 4px;
    border-bottom: 1px solid #334155;
}
.sidebar h3:first-child { margin-top: 0; }
.filter-section label {
    display: flex; align-items: center; gap: 6px; padding: 4px 6px;
    border-radius: 4px; cursor: pointer; font-size: 12px; transition: background 0.15s;
}
.filter-section label:hover { background: #334155; }
.filter-section input[type="checkbox"] { accent-color: #3b82f6; width: 14px; height: 14px; }
.graph-container { flex: 1; position: relative; }
#graph { width: 100%; height: 100%; }
.tooltip {
    position: absolute; background: #1e293b; border: 1px solid #475569;
    border-radius: 8px; padding: 10px 14px; font-size: 12px;
    pointer-events: none; opacity: 0; transition: opacity 0.15s;
    max-width: 280px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 100;
}
.tooltip h4 { color: #60a5fa; margin-bottom: 4px; font-size: 13px; }
.tooltip p { color: #cbd5e1; line-height: 1.4; }
.info-panel {
    position: absolute; bottom: 12px; right: 12px;
    background: #1e293b; border: 1px solid #334155; border-radius: 10px;
    padding: 16px; width: 400px; max-height: 500px; overflow-y: auto;
    display: none; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.info-panel h3 { color: #60a5fa; margin-bottom: 8px; font-size: 15px; }
.info-panel .close {
    position: absolute; top: 8px; right: 12px;
    cursor: pointer; color: #94a3b8; font-size: 20px; background: none; border: none;
}
.info-panel table { width: 100%; border-collapse: collapse; font-size: 11px; }
.info-panel th {
    text-align: left; color: #94a3b8; padding: 4px 6px;
    border-bottom: 1px solid #334155; font-weight: 500;
}
.info-panel td { padding: 4px 6px; border-bottom: 1px solid #1e293b; color: #e2e8f0; }
.legend {
    position: absolute; top: 12px; right: 12px;
    background: rgba(30, 41, 59, 0.92); border: 1px solid #334155;
    border-radius: 8px; padding: 10px 12px; font-size: 11px;
}
.legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.hours-legend {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(30, 41, 59, 0.92); border: 1px solid #334155;
    border-radius: 8px; padding: 10px 12px; font-size: 11px;
}
.hours-legend .total { color: #60a5fa; font-weight: 600; font-size: 13px; }
.hours-legend .label { color: #94a3b8; }
.stats {
    position: absolute; top: 12px; left: 12px;

}
.stats span { color: #60a5fa; font-weight: 600; }
.node { cursor: pointer; }
.link { stroke-opacity: 0.3; }
</style>

const nodesByType = {
    class: nodes.filter(n => n.type === "class").sort((a,b) => {
        const ma = a.label.match(/(\d+)([А-Я])/);
        const mb = b.label.match(/(\d+)([А-Я])/);
        if (ma && mb) return parseInt(ma[1]) - parseInt(mb[1]) || ma[2].localeCompare(mb[2]);
        return a.label.localeCompare(b.label);
    }),
    teacher: nodes.filter(n => n.type === "teacher").sort((a,b) => a.label.localeCompare(b.label)),
    subject: nodes.filter(n => n.type === "subject").sort((a,b) => a.label.localeCompare(b.label))
};

function buildFilters() {
    ["class", "subject", "teacher"].forEach(type => {
        const div = document.getElementById(type + "Filters");
        nodesByType[type].forEach(n => {
            div.innerHTML += `<label><input type="checkbox" checked data-type="${type}" data-id="${n.id}"> ${n.label}</label>`;
        });
    });
    document.querySelectorAll(".filter-section input").forEach(cb => cb.addEventListener("change", updateGraphVisibility));
}

function updateGraphVisibility() {
    const checked = new Set();
    document.querySelectorAll(".filter-section input:checked").forEach(cb => checked.add(cb.dataset.id));
    nodeElements.each(function(d) { d3.select(this).style("opacity", checked.has(d.id) ? 1 : 0.08); });
    linkElements.each(function(d) {
        const s = d.source.id || d.source, t = d.target.id || d.target;
        d3.select(this).style("opacity", (checked.has(s) && checked.has(t)) ? 0.35 : 0.02);
    });
    labelElements.each(function(d) { d3.select(this).style("opacity", checked.has(d.id) ? 1 : 0.08); });
    const vn = [...checked].filter(id => nodes.find(n => n.id === id)).length;
    const vl = uniqueLinks.filter(l => {
        const s = l.source.id || l.source, t = l.target.id || l.target;
        return checked.has(s) && checked.has(t);
    }).length;
    document.getElementById("stats").innerHTML = `Показано: <span>${vn}</span> узлов, <span>${vl}</span> связей`;
}

function buildDropdown() {
    const type = document.getElementById("filterType").value;
    const dd = document.getElementById("filterValue");
    dd.innerHTML = '<option value="">Все</option>';
    let items = type === "class" ? nodesByType.class : type === "teacher" ? nodesByType.teacher : type === "subject" ? nodesByType.subject : [];
    items.forEach(n => dd.innerHTML += `<option value="${n.id}">${n.label}</option>`);
}
document.getElementById("filterType").addEventListener("change", buildDropdown);

function applyFilter() {
    const type = document.getElementById("filterType").value;
    const value = document.getElementById("filterValue").value;
    document.querySelectorAll(".filter-section input").forEach(cb => cb.checked = false);
    if (!value) { resetFilter(); return; }
    const cb = document.querySelector(`input[data-id="${value}"]`);
    if (cb) cb.checked = true;
    uniqueLinks.forEach(l => {
        const s = l.source.id || l.source, t = l.target.id || l.target;
        if (s === value) { const c = document.querySelector(`input[data-id="${t}"]`); if (c) c.checked = true; }
        if (t === value) { const c = document.querySelector(`input[data-id="${s}"]`); if (c) c.checked = true; }
    });
    updateGraphVisibility();
}

function resetFilter() {
    document.querySelectorAll(".filter-section input").forEach(cb => cb.checked = true);
    updateGraphVisibility();
}

function resetAll() {
    document.querySelectorAll(".filter-section input").forEach(cb => cb.checked = false);
    updateGraphVisibility();
}

svg.call(zoom);

const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(uniqueLinks).id(d => d.id).distance(70).strength(0.4))
    .force("charge", d3.forceManyBody().strength(-180))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collision", d3.forceCollide().radius(25))
    .force("x", d3.forceX(width / 2).strength(0.03))
    .force("y", d3.forceY(height / 2).strength(0.03));

const linkElements = g.append("g").selectAll("line").data(uniqueLinks).join("line")
    .attr("class", "link").attr("stroke", "#475569")
    .attr("stroke-width", d => Math.min(Math.sqrt(d.value) * 1.2, 6));

const nodeElements = g.append("g").selectAll("circle").data(nodes).join("circle").attr("class", "node")
    .attr("r", d => d.type === "class" ? 14 : d.type === "teacher" ? 8 : 10)
    .attr("fill", d => COLORS[d.type]).attr("stroke", "#0f172a").attr("stroke-width", 2)
    .call(d3.drag().on("start", dragStarted).on("drag", dragged).on("end", dragEnded));

const labelElements = g.append("g").selectAll("text").data(nodes).join("text")
    .text(d => d.label).attr("font-size", d => d.type === "class" ? 12 : 9)
    .attr("font-weight", d => d.type === "class" ? 600 : 400)
    .attr("fill", "#e2e8f0").attr("text-anchor", "middle")
    .attr("dy", d => d.type === "class" ? 26 : 20)
    .attr("pointer-events", "none").style("text-shadow", "0 1px 4px rgba(0,0,0,0.9)");

const tooltip = document.getElementById("tooltip");

nodeElements.on("mouseover", function(event, d) {
    const connected = uniqueLinks.filter(l =>
        (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id
    );
    d3.select(this).attr("r", d.type === "class" ? 18 : d.type === "teacher" ? 12 : 14);
    let html = `<h4>${d.label}</h4>`;
    html += `<p>Тип: ${d.type === "class" ? "Класс" : d.type === "teacher" ? "Учитель" : "Предмет"}</p>`;
    html += `<p>Связей: ${connected.length}</p>`;
    if (d.type === "class") {
        const subjects = new Set();
        connected.forEach(l => {
            const other = (l.source.id || l.source) === d.id ? (l.target.id || l.target) : (l.source.id || l.source);
            const node = nodes.find(n => n.id === other);
            if (node && node.type === "subject") subjects.add(other);
        });
        html += `<p>Предметы (${subjects.size}): ${[...subjects].slice(0, 8).join(", ")}${subjects.size > 8 ? "..." : ""}</p>`;
    } else if (d.type === "teacher") {
        const classes = new Set();
        connected.forEach(l => {
            const other = (l.source.id || l.source) === d.id ? (l.target.id || l.target) : (l.source.id || l.source);
            const node = nodes.find(n => n.id === other);
            if (node && node.type === "class") classes.add(other);
        });
        html += `<p>Классы: ${[...classes].join(", ")}</p>`;
    }
    tooltip.innerHTML = html;
    tooltip.style.opacity = 1;
    tooltip.style.left = Math.min(event.pageX + 12, window.innerWidth - 300) + "px";
    tooltip.style.top = (event.pageY - 10) + "px";
})
.on("mouseout", function(event, d) {
    d3.select(this).attr("r", d.type === "class" ? 14 : d.type === "teacher" ? 8 : 10);
    tooltip.style.opacity = 0;
})
.on("click", function(event, d) { showInfoPanel(d); });

function showInfoPanel(d) {
    const panel = document.getElementById("infoPanel");
    const content = document.getElementById("infoContent");
    const connected = uniqueLinks.filter(l =>
        (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id
    );
    let html = `<h3>${d.label}</h3>`;
    html += `<p style="color:#94a3b8;margin-bottom:10px;font-size:12px">Тип: ${d.type === "class" ? "Класс" : d.type === "teacher" ? "Учитель" : "Предмет"} · Связей: ${connected.length}</p>`;

    if (d.type === "class") {
        html += `<table><tr><th>Предмет</th><th>Учитель</th><th>Группы</th><th>Часы</th></tr>`;
        const items = [];
        connected.forEach(l => {
            const s = l.source.id || l.source, t = l.target.id || l.target;
            const teacherNode = nodes.find(n => n.id === (s === d.id ? t : s) && n.type === "teacher");
            if (teacherNode) {
                const key = [d.id, teacherNode.id].sort().join("|");
                const summary = linkSummary[key];
                if (summary) {
                    summary.subjects.forEach(subj => {
                        items.push({subject: subj, teacher: teacherNode.id, group: summary.groups.join(", ") || "—", hours: summary.count});
                    });
                }
            }
        });
        const seen = new Set();
        items.sort((a,b) => a.subject.localeCompare(b.subject)).forEach(item => {
            const key = item.subject + "|" + item.teacher;
            if (!seen.has(key)) { seen.add(key); html += `<tr><td>${item.subject}</td><td>${item.teacher}</td><td>${item.group}</td><td>${item.hours}</td></tr>`; }
        });
        html += `</table>`;
    } else if (d.type === "teacher") {
        html += `<table><tr><th>Предмет</th><th>Класс</th><th>Группы</th><th>Часы</th></tr>`;
        const items = [];
        connected.forEach(l => {
            const s = l.source.id || l.source, t = l.target.id || l.target;
            const classNode = nodes.find(n => n.id === (s === d.id ? t : s) && n.type === "class");
            if (classNode) {
                const key = [d.id, classNode.id].sort().join("|");
                const summary = linkSummary[key];
                if (summary) {
                    summary.subjects.forEach(subj => {
                        items.push({subject: subj, class: classNode.id, group: summary.groups.join(", ") || "—", hours: summary.count});
                    });
                }
            }
        });
        const seen = new Set();
        items.sort((a,b) => a.class.localeCompare(b.class) || a.subject.localeCompare(b.subject)).forEach(item => {
            const key = item.subject + "|" + item.class;
            if (!seen.has(key)) { seen.add(key); html += `<tr><td>${item.subject}</td><td>${item.class}</td><td>${item.group}</td><td>${item.hours}</td></tr>`; }
        });
        html += `</table>`;
    } else if (d.type === "subject") {
        html += `<table><tr><th>Учитель</th><th>Класс</th><th>Группы</th><th>Часы</th></tr>`;
        const items = [];
        connected.forEach(l => {
            const s = l.source.id || l.source, t = l.target.id || l.target;
            const other = nodes.find(n => n.id === (s === d.id ? t : s));
            if (other && other.type === "teacher") {
                const key = [d.id, other.id].sort().join("|");
                const summary = linkSummary[key];
                if (summary) {
                    summary.classes.forEach(cls => {
                        items.push({teacher: other.id, class: cls, group: summary.groups.join(", ") || "—", hours: summary.count});
                    });
                }
            }
        });
        const seen = new Set();
        items.sort((a,b) => a.class.localeCompare(b.class) || a.teacher.localeCompare(b.teacher)).forEach(item => {
            const key = item.teacher + "|" + item.class;
            if (!seen.has(key)) { seen.add(key); html += `<tr><td>${item.teacher}</td><td>${item.class}</td><td>${item.group}</td><td>${item.hours}</td></tr>`; }
        });
        html += `</table>`;
    }
    content.innerHTML = html;
    panel.style.display = "block";
}

function closeInfoPanel() { document.getElementById("infoPanel").style.display = "none"; }

simulation.on("tick", () => {
    linkElements.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    nodeElements.attr("cx", d => d.x).attr("cy", d => d.y);
    labelElements.attr("x", d => d.x).attr("y", d => d.y);
});

function dragStarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnded(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

buildFilters();
document.getElementById("stats").innerHTML = `Всего: <span>${nodes.length}</span> узлов, <span>${uniqueLinks.length}</span> связей`;
</script>
</body>
</html>
